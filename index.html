<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>枇杷树下的日记</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
</head>
<body>
    <div class="scene" id="scene">
        <div class="book" id="book">
            <div class="page" id="p1">
                <div class="page-front cover">
                    <h1>枇杷树下的日记</h1>
                    <p>—— 温暖与记忆 ——</p>
                    <div class="guide">点击封面开启</div>
                </div>
                <div class="page-back paper">
                    <div class="diary-content">
                        <p>2026年3月18日 晴</p>
                        <p>阳光洒进窗户，枇杷树的影子投在书桌上。那些平凡的日子，如今回想起来都闪着光。</p>
                    </div>
                </div>
            </div>

            <div class="page" id="p2">
                <div class="page-front paper">
                    <div class="diary-content">
                        <p>记得那时候，我们总是在树下坐很久，聊着不着边际的梦想。风吹过叶子的声音，就是最美的背景音乐。</p>
                    </div>
                </div>
                <div class="page-back paper">
                    <div class="diary-content">
                        <p>时光荏苒，树长高了，我们也长大了。有些话写在纸上，有些话藏在风里。</p>
                    </div>
                </div>
            </div>

            <div class="page" id="p3">
                <div class="page-front paper">
                    <h3 class="page-title">夹在页间的信</h3>
                    <div class="envelope-wrapper" id="envelope">
                        <div class="envelope-body">
                            <div class="flap"></div>
                            <div class="letter">
                                <div class="letter-inner">
                                    <p>亲爱的 [占位符]:</p>
                                    <p>见字如面。希望无论走到哪里，家永远是那棵为你遮阴的枇杷树...</p>
                                    <p style="text-align: right; margin-top: 30px;">—— [你的名字]</p>
                                </div>
                            </div>
                            <div class="stamp"></div>
                        </div>
                    </div>
                    <p class="hint" id="hint-text">点击信封开启</p>
                </div>
                <div class="page-back cover">
                    <h2>珍藏记忆</h2>
                    <p>—— 完 ——</p>
                </div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button id="prevBtn">上一页</button>
        <button id="nextBtn">下一页</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
