<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>枇杷小筑 - 3D 交互日记</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
</head>
<body>
    <div class="scene" id="scene">
        <div class="book" id="book">
            <div class="page" id="p1" style="transform: translateZ(3px);">
                <div class="page-front cover">
                    <h1>枇杷树下的日记</h1>
                    <p>—— 温暖与记忆 ——</p>
                    <div class="guide">点击封面开启</div>
                </div>
                <div class="page-back paper">
                    <div class="diary-content">
                        <p>[此处替换：第一页背面内容。阳光透过树叶，在纸上留下斑驳的影...]</p>
                    </div>
                </div>
            </div>

            <div class="page" id="p2" style="transform: translateZ(2px);">
                <div class="page-front paper">
                    <div class="diary-content">
                        <h2>2026年3月18日</h2>
                        <p>[此处替换：第二页正面内容。枇杷熟了，满院子都是清甜的味道...]</p>
                    </div>
                </div>
                <div class="page-back paper">
                    <div class="diary-content">
                        <p>[此处替换：第二页背面内容。我们总是在树下坐很久...]</p>
                    </div>
                </div>
            </div>

            <div class="page" id="p3" style="transform: translateZ(1px);">
                <div class="page-front paper">
                    <div class="envelope-wrapper" id="envelope">
                        <div class="envelope-body">
                            <div class="flap"></div>
                            <div class="letter">
                                <div class="letter-text">
                                    <p>亲爱的 [占位符]:</p>
                                    <p>[此处替换：信件正文内容。无论时空如何变幻，家永远在这里...]</p>
                                    <p style="text-align: right;">—— [签名]</p>
                                </div>
                            </div>
                            <div class="stamp"></div>
                            <div class="postmark">2026.03.18</div>
                        </div>
                    </div>
                    <p class="hint">夹在页间的信</p>
                </div>
                <div class="page-back cover">
                    <h2>完</h2>
                </div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button id="prevBtn">上一页</button>
        <button id="nextBtn">下一页</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
