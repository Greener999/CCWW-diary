<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>枇杷树下的记忆 - 3D 治愈日记</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
</head>
<body>
    <div class="scene" id="scene">
        <div class="book" id="book">
            <div class="page" id="p1">
                <div class="page-front cover">
                    <h1>枇杷树下的日记</h1>
                    <p>—— 家的温馨瞬间 ——</p>
                    <div class="guide">[ 点击封面开启时光 ]</div>
                </div>
                <div class="page-back paper">
                    <div class="diary-content">
                        <p>2026年3月18日 晴</p>
                        <p>阳光透过枇杷叶的缝隙，碎金般洒在木桌上。这些微小的瞬间，汇聚成家的温暖...</p>
                    </div>
                </div>
            </div>

            <div class="page" id="p2">
                <div class="page-front paper">
                    <div class="diary-content">
                        <p>记得小时候最爱在树下听外婆讲故事。酸甜的果实，伴随着她轻柔的话语，那是时光里最治愈的味道。</p>
                    </div>
                </div>
                <div class="page-back paper">
                    <div class="diary-content">
                        <p>有些话写在纸上，有些话藏在风里。愿这本小小的日记，能珍藏所有不褪色的记忆。</p>
                    </div>
                </div>
            </div>

            <div class="page" id="p3">
                <div class="page-front paper">
                    <h3 style="margin-bottom:20px; color:#5d4037;">夹在页间的信</h3>
                    <div class="envelope-wrapper" id="envelope">
                        <div class="envelope-body">
                            <div class="flap"></div>
                            <div class="letter">
                                <div class="letter-inner">
                                    <p>亲爱的 [占位符]:</p>
                                    <p>见字如面。希望无论走到哪里，家永远是那棵为你遮阴的枇杷树...</p>
                                    <p style="text-align: right; margin-top: 30px;">—— [你的名字]</p>
                                </div>
                            </div>
                            <div class="stamp"></div>
                        </div>
                    </div>
                    <p class="hint">[ 点击信封封口开启 ]</p>
                </div>
                <div class="page-back cover">
                    <h2>珍藏记忆</h2>
                    <p>—— 完 ——</p>
                </div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button id="prevBtn">上一页</button>
        <button id="nextBtn">下一页</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
